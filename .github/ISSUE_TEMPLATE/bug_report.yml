name: Bug report
description: Something in the SDK is broken or not behaving as expected.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can — the more detail, the faster we can fix it.

        For security-sensitive issues, **do NOT open a public issue.** See [SECURITY.md](https://github.com/Thetanuts-Finance/thetanuts-sdk/blob/main/SECURITY.md).

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: Output of `npm ls @thetanuts-finance/thetanuts-client`
      placeholder: "0.2.1"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`
      placeholder: "v20.10.0"
    validations:
      required: true

  - type: dropdown
    id: chain-id
    attributes:
      label: Chain ID
      options:
        - "8453 (Base)"
        - "1 (Ethereum)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest snippet that triggers the bug. Include imports, client setup, the call that fails.
      render: typescript
      placeholder: |
        import { ThetanutsClient } from '@thetanuts-finance/thetanuts-client';
        // …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: "fillOrder() should return a transaction receipt"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include the full error message and stack trace if any.
      render: shell
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Workarounds you tried, related issues, suspected cause, etc.
